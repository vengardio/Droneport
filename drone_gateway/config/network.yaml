# ============================================
# Сетевая конфигурация дронпорта (DEBUG MODE)
# Файл: config/network.yaml
# ============================================

# Настройки подключения к центральному серверу
server:
  ip: "192.168.96.1"           # LOCALHOST для тестов. Замените на IP сервера при реальной работе
  port: 9006                # UDP порт сервера
  timeout: 5.0              # Таймаут ожидания ответа, секунды
  retry_count: 3            # Количество повторов при ошибке отправки

# Параметры самого дронпорта
droneport:
  id: 1                     # NUM дронпорта (1...254)
  subsystem_id: 2001        # ID подсистемы (фиксировано по протоколу)
  status_interval: 420      # Интервал отправки STATUS_DRONEPORT (7 мин)

# Локальные сетевые настройки OrangePi
local:
  bind_ip: "0.0.0.0"        # Слушать все интерфейсы
  bind_port: 7003           # Локальный UDP порт для приёма команд
  ethernet_interface: "eth0"

# === НАСТРОЙКИ ОТЛАДКИ (ВКЛЮЧЕНО) ===
debug:
  log_raw_packets: true     # [ВАЖНО] Логировать сырые байты (hex) в logs/system.log
  echo_mode: true           # [ВАЖНО] Отвечать заглушками на команды без реального железа
  simulate_server: false    # Если true — эмулировать сервер (нужно для тестов без сети)

# Тайминги системы
timings:
  udp_receive_timeout: 1.0
  command_execution_timeout: 30.0
  heartbeat_interval: 60.0